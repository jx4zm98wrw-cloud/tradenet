# Local dev stack. For real environments, supply secrets via the orchestrator
# (Kubernetes Secrets / AWS Parameter Store / Vault), not literal env values
# in compose files. The ${VAR:-default} syntax means env vars from a `.env`
# file (or the shell) override the bundled defaults.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tm}
      POSTGRES_DB: ${POSTGRES_DB:-tm}
    ports:
      - "${POSTGRES_PORT:-5435}:5432"
    volumes:
      - tm_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tm} -d ${POSTGRES_DB:-tm}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6380}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # RQ worker — runs gazette ingest (`ingest` queue) and the Madrid enrichment
  # sweep (`madrid` queue). Containerized so it survives reboots / session-end
  # (the API still runs on the host in dev; only the worker lives here).
  worker:
    build:
      context: ./backend
    command: python -m worker.run_worker
    environment:
      # Internal compose network: reach postgres/redis by service name on their
      # container ports (NOT the host-published 5435/6380).
      TM_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-tm}:${POSTGRES_PASSWORD:-tm}@postgres:5432/${POSTGRES_DB:-tm}
      TM_DATABASE_URL_SYNC: postgresql+psycopg2://${POSTGRES_USER:-tm}:${POSTGRES_PASSWORD:-tm}@postgres:5432/${POSTGRES_DB:-tm}
      TM_REDIS_URL: redis://redis:6379/0
      TM_SECRET_KEY: ${TM_SECRET_KEY:-dev-only-not-for-prod}
      # data_dir auto-resolves to "/" inside the image (code at /srv/backend), so
      # set it explicitly. The bind-mount below makes it the host project root,
      # so madrid_cache/ + image/ are shared with the host API.
      TM_DATA_DIR: /data
    volumes:
      - ../:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  tm_pgdata:
