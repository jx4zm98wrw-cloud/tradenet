# Local dev stack. For real environments, supply secrets via the orchestrator
# (Kubernetes Secrets / AWS Parameter Store / Vault), not literal env values
# in compose files. The ${VAR:-default} syntax means env vars from a `.env`
# file (or the shell) override the bundled defaults.

# Shared base for the RQ workers. We run one worker per queue (worker-ingest /
# worker-madrid / worker-domestic) so gazette ingest and the two enrichment
# sweeps get isolated, parallel throughput — a heavy run on one queue can never
# starve another. Scale a queue by running N copies of its service (RQ
# load-balances within a queue). TM_WORKER_QUEUES picks each worker's queue set.
x-worker-base: &worker-base
  build:
    context: ./backend
  command: python -m worker.run_worker
  environment: &worker-env
    # Internal compose network: reach postgres/redis by service name on their
    # container ports (NOT the host-published 5435/6380).
    TM_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-tm}:${POSTGRES_PASSWORD:-tm}@postgres:5432/${POSTGRES_DB:-tm}
    TM_DATABASE_URL_SYNC: postgresql+psycopg2://${POSTGRES_USER:-tm}:${POSTGRES_PASSWORD:-tm}@postgres:5432/${POSTGRES_DB:-tm}
    TM_REDIS_URL: redis://redis:6379/0
    TM_SECRET_KEY: ${TM_SECRET_KEY:-dev-only-not-for-prod}
    # data_dir auto-resolves to "/" inside the image (code at /srv/backend), so
    # set it explicitly. The bind-mount below makes it the host project root,
    # so madrid_cache/ + domestic_cache/ + image/ are shared with the host API.
    TM_DATA_DIR: /data
  volumes:
    - ../:/data
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  restart: unless-stopped
  # The worker serves no HTTP, so it must NOT inherit the image's API
  # healthcheck (curl :8000/health) — that always fails ("unhealthy"). Check
  # the worker's real lifeline instead: connectivity to its Redis queue.
  healthcheck:
    test: ["CMD", "python", "-c", "import os; from redis import Redis; Redis.from_url(os.environ['TM_REDIS_URL']).ping()"]
    interval: 30s
    timeout: 5s
    retries: 3
    start_period: 10s

services:
  postgres:
    image: postgres:16-alpine
    # Raise work_mem well above Postgres' 4MB default so sort/hash nodes over the
    # 238k-row `trademarks` table stay in memory instead of spilling to a temp
    # file on disk (a filtered DISTINCT-ON dedup sort would spill ~19MB at 4MB).
    # Dev-stack tuning only (few connections); safe at this scale. Takes effect on
    # the next `docker compose up` (recreate) of the postgres service.
    command: ["postgres", "-c", "work_mem=64MB", "-c", "maintenance_work_mem=256MB"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tm}
      POSTGRES_DB: ${POSTGRES_DB:-tm}
    ports:
      # Bind to loopback only — never publish the DB on all host interfaces
      # (dev stack has weak creds; loopback removes the remote-SQL attack surface).
      - "127.0.0.1:${POSTGRES_PORT:-5435}:5432"
    volumes:
      - tm_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tm} -d ${POSTGRES_DB:-tm}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      # Loopback only — an unauthenticated Redis reachable from the LAN + RQ's
      # pickle jobs would be a remote-code-exec path into the workers.
      - "127.0.0.1:${REDIS_PORT:-6380}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # RQ workers — one process per queue so each sweep has isolated, parallel
  # throughput (see x-worker-base above). Containerized so they survive reboots /
  # session-end (the API still runs on the host in dev). To collapse back to a
  # single all-queues worker, keep one service and set
  # `TM_WORKER_QUEUES: ingest,madrid,domestic` on it.
  worker-ingest:
    <<: *worker-base
    environment:
      <<: *worker-env
      TM_WORKER_QUEUES: ingest

  worker-madrid:
    <<: *worker-base
    environment:
      <<: *worker-env
      TM_WORKER_QUEUES: madrid

  worker-domestic:
    <<: *worker-base
    environment:
      <<: *worker-env
      TM_WORKER_QUEUES: domestic

volumes:
  tm_pgdata:
