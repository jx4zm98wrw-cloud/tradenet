# CI — lint, test, build. No untrusted GitHub event payloads are interpolated
# into shell commands; the workflow only uses fixed strings and env vars from
# the job's static `env:` block + service-container outputs.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tm
          POSTGRES_PASSWORD: tm
          POSTGRES_DB: tm
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U tm -d tm"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]

    env:
      TM_DATABASE_URL: postgresql+asyncpg://tm:tm@localhost:5432/tm
      TM_DATABASE_URL_SYNC: postgresql+psycopg2://tm:tm@localhost:5432/tm
      TM_REDIS_URL: redis://localhost:6379/0

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: pip install -r app/backend/requirements-dev.txt

      - name: Lint
        working-directory: app/backend
        run: |
          ruff check .
          ruff format --check .

      - name: Type-check
        working-directory: app/backend
        # Scoped to api + worker (the actively-typed packages).
        # tm_extractor/ and image_extractor/ are vendored — type checks
        # would drown out signal from real bugs.
        run: mypy api worker

      - name: Migrate
        working-directory: app/backend
        run: alembic upgrade head

      - name: Schema-vs-models drift check
        working-directory: app/backend
        # Fails if SQLAlchemy models have diverged from the latest migration.
        # Forces "model changed without migration" PRs to add the migration
        # before merge.
        run: alembic check

      - name: Test
        working-directory: app/backend
        run: pytest tests/ -q

  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: { version: 10 }

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: app/frontend/pnpm-lock.yaml

      - name: Install
        working-directory: app/frontend
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: app/frontend
        run: pnpm lint

      - name: Build
        working-directory: app/frontend
        run: pnpm build

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: app/frontend/pnpm-lock.yaml
      - name: pnpm audit
        working-directory: app/frontend
        # Fail the job on high-severity vulns so the team sees them.
        # Previously appended `|| true` which silently swallowed warnings.
        run: pnpm audit --prod --audit-level=high
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: pip-audit
        # Fail the job on any reported vuln. Previously appended `|| true`
        # which silently swallowed warnings.
        #
        # --ignore-vuln is the documented escape hatch for known-unfixable
        # advisories where no patched release is yet on PyPI. Each entry
        # MUST carry an "until …" rationale and be reviewed periodically.
        # Right now: python-multipart 0.0.20 is the latest published, but
        # advisory drafts require >= 0.0.22 / 0.0.26 / 0.0.27 (future
        # CVE-2026-* entries). Drop these once the patched releases ship.
        # Each --ignore-vuln entry carries a "patched in" version that
        # isn't yet on PyPI. Review and remove once published.
        run: |
          pip install pip-audit
          pip-audit -r app/backend/requirements.txt --strict \
            --ignore-vuln CVE-2026-24486   `# python-multipart, needs unreleased 0.0.22` \
            --ignore-vuln CVE-2026-40347   `# python-multipart, needs unreleased 0.0.26` \
            --ignore-vuln CVE-2026-42561   `# python-multipart, needs unreleased 0.0.27` \
            --ignore-vuln PYSEC-2026-161   `# starlette, needs 1.0.1; fastapi caps at <1.0`

  image-scan:
    name: Backend image scan (Trivy)
    runs-on: ubuntu-latest
    # Trivy needs to write SARIF; SBOM upload needs artifact write.
    # security-events: write lets us push findings into the GitHub
    # "Code scanning alerts" view so reviewers see them inline on PRs.
    # actions: read is required by codeql-action/upload-sarif's telemetry
    # path (GET /repos/.../actions/runs/{id}); without it the step emits
    # ##[error]Resource not accessible by integration and fails the job
    # *after* a successful scan.
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        # Build context = app/backend so the COPY layers match the prod build
        # exactly. Tagged for-ci-only — never pushed.
        run: |
          docker build \
            -f app/backend/Dockerfile \
            -t tradenet-backend:ci \
            app/backend

      - name: Trivy vulnerability scan (fail on HIGH/CRITICAL)
        # Pinned to a release tag (not @master) so a compromised upstream
        # can't silently change scan behavior on us. Bump deliberately.
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: tradenet-backend:ci
          format: table
          severity: HIGH,CRITICAL
          # Only flag fixed CVEs — unfixed ones are noise we can't act on
          # until upstream ships a patch.
          ignore-unfixed: true
          exit-code: "1"
          # OS packages + python wheels both count.
          vuln-type: os,library
          # Allow-list documented in .trivyignore at the repo root. Each
          # entry carries a "needs vX.Y.Z" sunset condition; review when
          # Dependabot bumps the relevant package and the line auto-stales.
          trivyignores: .trivyignore

      - name: Trivy SARIF (for GitHub Security tab)
        # Second pass — same scan, SARIF output, never fails the job. We
        # surface findings (incl. MEDIUM/LOW) in the Security tab without
        # blocking PRs on them. Runs even if the gating scan above failed,
        # so we still get a record of what tripped CI.
        if: always()
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: tradenet-backend:ci
          format: sarif
          output: trivy-results.sarif
          ignore-unfixed: true
          vuln-type: os,library
          trivyignores: .trivyignore

      - name: Upload SARIF to GitHub Security
        if: always() && hashFiles('trivy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-backend-image

      - name: Generate SBOM (CycloneDX)
        # SBOM is a separate Trivy invocation — useful artifact for
        # incident response (which versions of which libs shipped in
        # which CI build). Doesn't gate the build.
        if: always()
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: tradenet-backend:ci
          format: cyclonedx
          output: sbom.cdx.json

      - name: Upload SBOM artifact
        if: always() && hashFiles('sbom.cdx.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: sbom-backend-cyclonedx
          path: sbom.cdx.json
          retention-days: 90
