# CI — lint, test, build. No untrusted GitHub event payloads are interpolated
# into shell commands; the workflow only uses fixed strings and env vars from
# the job's static `env:` block + service-container outputs.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tm
          POSTGRES_PASSWORD: tm
          POSTGRES_DB: tm
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U tm -d tm"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]

    env:
      TM_DATABASE_URL: postgresql+asyncpg://tm:tm@localhost:5432/tm
      TM_DATABASE_URL_SYNC: postgresql+psycopg2://tm:tm@localhost:5432/tm
      TM_REDIS_URL: redis://localhost:6379/0

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: pip install -r app/backend/requirements-dev.txt

      - name: Lint
        working-directory: app/backend
        run: |
          ruff check .
          ruff format --check .

      - name: Type-check
        working-directory: app/backend
        # Scoped to api + worker (the actively-typed packages).
        # tm_extractor/ and image_extractor/ are vendored — type checks
        # would drown out signal from real bugs.
        run: mypy api worker

      - name: Migrate
        working-directory: app/backend
        run: alembic upgrade head

      - name: Schema-vs-models drift check
        working-directory: app/backend
        # Fails if SQLAlchemy models have diverged from the latest migration.
        # Forces "model changed without migration" PRs to add the migration
        # before merge.
        run: alembic check

      - name: Test
        working-directory: app/backend
        run: pytest tests/ -q

  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with: { version: 10 }

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: app/frontend/pnpm-lock.yaml

      - name: Install
        working-directory: app/frontend
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: app/frontend
        run: pnpm lint

      - name: Build
        working-directory: app/frontend
        run: pnpm build

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      # No `cache: pnpm` here — this job runs `pnpm audit` (which queries
      # the registry directly from the lockfile) without `pnpm install`,
      # so there's no node_modules tree to cache. With cache enabled,
      # setup-node's post-job save step errors out with "Path Validation
      # Error: Path(s) specified in the action for caching do(es) not
      # exist" on any cache-miss (i.e. any lockfile-changing PR).
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: pnpm audit
        working-directory: app/frontend
        # Fail the job on high-severity vulns so the team sees them.
        # Previously appended `|| true` which silently swallowed warnings.
        run: pnpm audit --prod --audit-level=high
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - name: pip-audit
        # Fail the job on any reported vuln (no `|| true`, no ignore list).
        #
        # The previous --ignore-vuln entries (python-multipart + starlette
        # advisories) are gone: the patched releases now ship and are pinned
        # in requirements.txt — starlette 1.3.1, python-multipart 0.0.32,
        # unblocked by prometheus-fastapi-instrumentator 8.0.0 (which lifted
        # the starlette<1.0 cap). Audit is clean with no exceptions. Re-add
        # --ignore-vuln (with a "patched in <version>" rationale) only for a
        # genuinely unfixable advisory.
        run: |
          pip install pip-audit
          pip-audit -r app/backend/requirements.txt --strict

  image-scan:
    name: Backend image scan (Trivy)
    runs-on: ubuntu-latest
    # Trivy needs to write SARIF; SBOM upload needs artifact write.
    # security-events: write lets us push findings into the GitHub
    # "Code scanning alerts" view so reviewers see them inline on PRs.
    # actions: read is required by codeql-action/upload-sarif's telemetry
    # path (GET /repos/.../actions/runs/{id}); without it the step emits
    # ##[error]Resource not accessible by integration and fails the job
    # *after* a successful scan.
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v6

      - name: Build backend image
        # Build context = app/backend so the COPY layers match the prod build
        # exactly. Tagged for-ci-only — never pushed.
        run: |
          docker build \
            -f app/backend/Dockerfile \
            -t tradenet-backend:ci \
            app/backend

      - name: Trivy vulnerability scan (fail on HIGH/CRITICAL)
        # Pinned to a release tag (not @master) so a compromised upstream
        # can't silently change scan behavior on us. Bump deliberately.
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: tradenet-backend:ci
          format: table
          severity: HIGH,CRITICAL
          # Only flag fixed CVEs — unfixed ones are noise we can't act on
          # until upstream ships a patch.
          ignore-unfixed: true
          exit-code: "1"
          # OS packages + python wheels both count.
          vuln-type: os,library
          # Allow-list documented in .trivyignore at the repo root. Each
          # entry carries a "needs vX.Y.Z" sunset condition; review when
          # Dependabot bumps the relevant package and the line auto-stales.
          trivyignores: .trivyignore

      - name: Trivy SARIF (for GitHub Security tab)
        # Second pass — same scan, SARIF output, never fails the job. We
        # surface findings (incl. MEDIUM/LOW) in the Security tab without
        # blocking PRs on them. Runs even if the gating scan above failed,
        # so we still get a record of what tripped CI.
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: tradenet-backend:ci
          format: sarif
          output: trivy-results.sarif
          ignore-unfixed: true
          vuln-type: os,library
          trivyignores: .trivyignore

      - name: Upload SARIF to GitHub Security
        # Best-effort — surfaces findings in the Security tab when Code
        # Scanning is enabled on the repo. If it isn't (free private
        # repos without GHAS, or first-time enablement pending), the
        # step 403s with "Code scanning is not enabled for this
        # repository" and we don't want that to fail the job. The
        # gating Trivy scan above is the real security policy gate.
        # To enable: Settings → Code security and analysis → Code
        # scanning → Set up.
        if: always() && hashFiles('trivy-results.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy-backend-image

      - name: Generate SBOM (CycloneDX)
        # SBOM is a separate Trivy invocation — useful artifact for
        # incident response (which versions of which libs shipped in
        # which CI build). Doesn't gate the build.
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: tradenet-backend:ci
          format: cyclonedx
          output: sbom.cdx.json

      - name: Upload SBOM artifact
        if: always() && hashFiles('sbom.cdx.json') != ''
        uses: actions/upload-artifact@v7
        with:
          name: sbom-backend-cyclonedx
          path: sbom.cdx.json
          retention-days: 90

  e2e:
    # End-to-end Playwright smoke against a full live stack (Postgres +
    # Redis services, real backend via uvicorn, real frontend via
    # `pnpm start` after `pnpm build`). Catches regressions the unit
    # tests can't — broken login flow, mis-wired API contract,
    # client-side routing surprises.
    name: E2E (Playwright)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tm
          POSTGRES_PASSWORD: tm
          POSTGRES_DB: tm
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U tm -d tm"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]

    env:
      # Bind backend to 127.0.0.1:8000 + frontend to :3000 so Playwright's
      # default base URL works without env overrides in the specs.
      TM_DATABASE_URL: postgresql+asyncpg://tm:tm@localhost:5432/tm
      TM_DATABASE_URL_SYNC: postgresql+psycopg2://tm:tm@localhost:5432/tm
      TM_REDIS_URL: redis://localhost:6379/0
      # `ci` is in the `_SAFE_DEV_ENVS` allowlist (settings.py), so the
      # dev-default TM_SECRET_KEY is accepted. Production envs reject it.
      TM_ENV: ci
      PLAYWRIGHT_ADMIN_EMAIL: playwright@ci.local
      # 32+ chars to satisfy the schema's min-length validator.
      PLAYWRIGHT_ADMIN_PASSWORD: ci-playwright-password-1234567890
      # Opt-in for tests/e2e/visual.spec.ts — baselines under
      # visual.spec.ts-snapshots/ were baked on the same runner image
      # (mcr.microsoft.com/playwright:v1.60.0-noble) that ubuntu-latest
      # uses, so font hinting + sub-pixel rendering match.
      PLAYWRIGHT_VISUAL: "1"

    steps:
      - uses: actions/checkout@v6

      # ---- Backend setup ----
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend deps
        run: pip install -r app/backend/requirements-dev.txt

      - name: Apply migrations
        working-directory: app/backend
        run: alembic upgrade head

      - name: Bootstrap Playwright test user
        working-directory: app/backend
        # Same credentials Playwright's auth.setup.ts logs in with
        # (via env overrides). Idempotent: create_user errors on
        # duplicate email, but on a fresh CI postgres there's no
        # duplicate to hit.
        run: |
          python -m scripts.create_user \
            --email "$PLAYWRIGHT_ADMIN_EMAIL" \
            --name "CI Playwright" \
            --role admin \
            --password "$PLAYWRIGHT_ADMIN_PASSWORD"

      - name: Start backend (uvicorn, background)
        working-directory: app/backend
        # Background with & — GitHub Actions keeps backgrounded
        # processes alive across steps within the same job. We capture
        # stdout/stderr to a file so the upload-on-failure step can
        # grab it for diagnostics.
        run: |
          nohup uvicorn api.main:app --host 127.0.0.1 --port 8000 \
            --log-level warning > /tmp/backend.log 2>&1 &
          echo $! > /tmp/backend.pid

      - name: Wait for backend /health
        # Poll up to 60s. uvicorn cold-start on CI runners is ~3-5s,
        # but pip-installed C extensions can take longer on a cache
        # miss. 60s is comfortable headroom.
        run: |
          for i in {1..60}; do
            if curl -sf http://127.0.0.1:8000/health >/dev/null; then
              echo "Backend ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::Backend never came up. Tail of backend.log:"
          tail -50 /tmp/backend.log
          exit 1

      # ---- Frontend setup ----
      - uses: pnpm/action-setup@v4
        with: { version: 10 }

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: app/frontend/pnpm-lock.yaml

      - name: Install frontend deps
        working-directory: app/frontend
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: app/frontend
        run: pnpm build

      - name: Start frontend (production build, background)
        working-directory: app/frontend
        # pnpm start serves the production build — closer to what'll
        # actually ship than `pnpm dev`. PLAYWRIGHT_SKIP_WEBSERVER=1
        # (set on the test step below) tells the playwright.config.ts
        # not to spawn its own dev server.
        run: |
          nohup pnpm start > /tmp/frontend.log 2>&1 &
          echo $! > /tmp/frontend.pid

      - name: Wait for frontend
        run: |
          for i in {1..60}; do
            if curl -sf http://127.0.0.1:3000/ >/dev/null; then
              echo "Frontend ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::Frontend never came up. Tail of frontend.log:"
          tail -50 /tmp/frontend.log
          exit 1

      # ---- Playwright ----
      - name: Install Playwright browsers
        working-directory: app/frontend
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright suite
        working-directory: app/frontend
        env:
          # The frontend is already running on :3000 from the step
          # above; without this, playwright.config.ts would try to
          # spawn a second `pnpm dev` that races on the port.
          PLAYWRIGHT_SKIP_WEBSERVER: "1"
        run: pnpm test:e2e

      # ---- Diagnostics on failure ----
      - name: Upload Playwright HTML report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: app/frontend/playwright-report/
          retention-days: 14

      - name: Upload Playwright traces on failure
        # `trace: retain-on-failure` in playwright.config.ts saves the
        # full timeline (DOM snapshots, network, console) for failing
        # tests. Worth their weight in gold when debugging flakes.
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-traces
          path: app/frontend/test-results/
          retention-days: 14

      - name: Upload backend/frontend logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-server-logs
          path: |
            /tmp/backend.log
            /tmp/frontend.log
          retention-days: 14
