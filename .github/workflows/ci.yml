# CI — lint, test, build. No untrusted GitHub event payloads are interpolated
# into shell commands; the workflow only uses fixed strings and env vars from
# the job's static `env:` block + service-container outputs.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tm
          POSTGRES_PASSWORD: tm
          POSTGRES_DB: tm
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U tm -d tm"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]

    env:
      TM_DATABASE_URL: postgresql+asyncpg://tm:tm@localhost:5432/tm
      TM_DATABASE_URL_SYNC: postgresql+psycopg2://tm:tm@localhost:5432/tm
      TM_REDIS_URL: redis://localhost:6379/0

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: pip install -r app/backend/requirements-dev.txt

      - name: Lint
        working-directory: app/backend
        run: |
          ruff check .
          ruff format --check .

      - name: Type-check
        working-directory: app/backend
        # Scoped to api + worker (the actively-typed packages).
        # tm_extractor/ and image_extractor/ are vendored — type checks
        # would drown out signal from real bugs.
        run: mypy api worker

      - name: Migrate
        working-directory: app/backend
        run: alembic upgrade head

      - name: Schema-vs-models drift check
        working-directory: app/backend
        # Fails if SQLAlchemy models have diverged from the latest migration.
        # Forces "model changed without migration" PRs to add the migration
        # before merge.
        run: alembic check

      - name: Test
        working-directory: app/backend
        run: pytest tests/ -q

  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: { version: 10 }

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: app/frontend/pnpm-lock.yaml

      - name: Install
        working-directory: app/frontend
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: app/frontend
        run: pnpm lint

      - name: Build
        working-directory: app/frontend
        run: pnpm build

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      # No `cache: pnpm` here — this job runs `pnpm audit` (which queries
      # the registry directly from the lockfile) without `pnpm install`,
      # so there's no node_modules tree to cache. With cache enabled,
      # setup-node's post-job save step errors out with "Path Validation
      # Error: Path(s) specified in the action for caching do(es) not
      # exist" on any cache-miss (i.e. any lockfile-changing PR).
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: pnpm audit
        working-directory: app/frontend
        # Fail the job on high-severity vulns so the team sees them.
        # Previously appended `|| true` which silently swallowed warnings.
        run: pnpm audit --prod --audit-level=high
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: pip-audit
        # Fail the job on any reported vuln. Previously appended `|| true`
        # which silently swallowed warnings.
        #
        # --ignore-vuln is the documented escape hatch for known-unfixable
        # advisories where no patched release is yet on PyPI. Each entry
        # MUST carry an "until …" rationale and be reviewed periodically.
        # Right now: python-multipart 0.0.20 is the latest published, but
        # advisory drafts require >= 0.0.22 / 0.0.26 / 0.0.27 (future
        # CVE-2026-* entries). Drop these once the patched releases ship.
        # Each --ignore-vuln entry carries a "patched in" version that
        # isn't yet on PyPI. Review and remove once published.
        run: |
          pip install pip-audit
          pip-audit -r app/backend/requirements.txt --strict \
            --ignore-vuln CVE-2026-24486   `# python-multipart, needs unreleased 0.0.22` \
            --ignore-vuln CVE-2026-40347   `# python-multipart, needs unreleased 0.0.26` \
            --ignore-vuln CVE-2026-42561   `# python-multipart, needs unreleased 0.0.27` \
            --ignore-vuln PYSEC-2026-161   `# starlette, needs 1.0.1; fastapi caps at <1.0`
