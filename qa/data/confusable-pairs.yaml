# Confusable-pair oracle for the similarity suite (qa/src/tnqa/similarity.py).
#
# Two kinds, labelled:
#   curated   — DISTINCT real marks (different application_number) that an examiner
#               would plausibly call confusable. The trustworthy, NON-CIRCULAR oracle.
#               Mined from real pg_trgm neighbours, then hand-kept where the pair is
#               a genuine clearance conflict (truncation, added initial, spacing,
#               typo, sound-alike). Recall = does a phonetic search for one surface
#               the other (both directions)?
#   synthetic — engine-style perturbation of ONE real mark; `query`/`query_b` carry
#               the perturbed strings and BOTH appnos are that same mark. Tests
#               "does a one-edit variant surface the original?" — inherently circular
#               (the engine vs its own transform), reported separately for contrast.
#
# Fields: a/b (display names), a_appno/b_appno (real IP VIETNAM application numbers),
# label, axis, note; optional query/query_b override the search string for a/b.

