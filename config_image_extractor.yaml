base_directory: .

max_workers: 1

image_settings:
  format: PNG
  preserve_quality: true

clustering:
  enabled: true
  cluster_threshold: 80
  combine_threshold: 80

pdf_types:
  # Whitespace inside the marker (\s*) tolerates pdfplumber/fitz splitting
  # "(210)" across kerned spans into "( 210 )" when the joined-line text
  # is rebuilt. Without this, the affected sectors get no label and the
  # logo PNG is saved as "unknown_*" and discarded.
  A:
    identifier: A_
    text_pattern: '\(\s*210\s*\)\s*([0-9][0-9A-Za-z\-]+)'
    image_name_pattern: '\(\s*210\s*\)\s*([0-9][0-9A-Za-z\-]+)'
  B:
    identifier: B_
    text_pattern: '\(\s*(?:210|116|111)\s*\)\s*([0-9A-Za-z\-]+)'
    image_name_pattern: '\(\s*(?:210|116|111)\s*\)\s*([0-9A-Za-z\-]+)'
